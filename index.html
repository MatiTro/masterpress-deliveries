<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterpress - Rejestr Dostaw</title>
<link rel="icon" type="image/png" href="images/sygnet_pochr2x.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="app-header">
        <img
            src="images/LOGOmasterpress_White_2024.png"
            alt="Masterpress"
            class="logo"
        >
    </header>

    <!-- GŁÓWNY KONTENER -->
    <main class="container">

        <!-- NOWA DOSTAWA -->
        <section class="card">

            <h2 id="formTitle" class="card-title-center">
    Nowa dostawa
</h2>
<p id="editInfo" class="edit-info"></p>
            <div class="form-group">
                <label for="supplier">Dostawca</label>
                <input
    type="text"
    id="supplier"
    list="suppliers"
    placeholder="Wpisz nazwę dostawcy"
    autocomplete="off"
>

<datalist id="suppliers">
    <option value="Kurier">
    <option value="Klockner">
    <option value="Far Eastern">
    <option value="Itochu">
    <option value="Liveo">
    <option value="Avery">
    <option value="Raflatac">
    <option value="Jinda">
    <option value="Magzew">
    <option value="Andersa">
</datalist>
            </div>

            <div class="form-group">
                <label for="pallets">Ilość palet</label>
                <input
                    type="number"
                    id="pallets"
                    min="1"
                    placeholder="0"
                >
            </div>

            <div class="form-group">
                <label for="notes">Uwagi</label>
                <textarea
                    id="notes"
                    rows="3"
                    placeholder="Opcjonalne uwagi"
                ></textarea>
            </div>

            <button id="addDeliveryBtn" class="btn-primary">
                Dodaj dostawę
            </button>

        </section>

        <!-- PODSUMOWANIE -->
        <section class="card">

    <div class="section-header">

        <h2>Podsumowanie dnia</h2>

        <button
            id="reportBtn"
            class="btn-secondary">
            Raport
        </button>

    </div>

    <div class="stats">

        <div class="stat-box">
            <span id="deliveryCount" class="stat-value">0</span>
            <span class="stat-label">Dostaw</span>
        </div>

        <div class="stat-box">
            <span id="palletCount" class="stat-value">0</span>
            <span class="stat-label">Palet</span>
        </div>

    </div>

</section>

        <!-- LISTA DOSTAW -->
        <section class="card">

            <div class="section-header">

                <h2>Dzisiejsze dostawy</h2>

                

            </div>

            <div id="deliveryList">

            
            </div>

        </section>
<!-- PODSUMOWANIE MIESIĄCA -->
<section class="card">

    <div class="section-header">

        <h2>Podsumowanie miesiąca</h2>

        <button
            id="monthlyReportBtn"
            class="btn-secondary">
            Raport msc
        </button>

    </div>

    <div class="stats">

        <div class="stat-box">
            <span
                id="monthlyDeliveryCount"
                class="stat-value">
                0
            </span>

            <span class="stat-label">
                Dostaw
            </span>
        </div>

        <div class="stat-box">
            <span
                id="monthlyPalletCount"
                class="stat-value">
                0
            </span>

            <span class="stat-label">
                Palet
            </span>
        </div>

    </div>

</section>
    </main>

<div id="deleteModal" class="modal">

    <div class="modal-content">

        <h3>Usuń dostawę</h3>

        <p>
            Czy na pewno chcesz usunąć:
        </p>

        <div id="deleteInfo" class="delete-info">
        </div>

        <div class="modal-actions">

            <button
                id="cancelDeleteBtn"
                class="btn-secondary">
                Anuluj
            </button>

            <button
                id="confirmDeleteBtn"
                class="btn-delete">
                Usuń
            </button>

        </div>

    </div>

</div>

<div id="reportModal" class="modal">

<div class="modal-content">

    <h3>Raport dostaw</h3>

    <pre id="reportContent" class="report-content"></pre>

    <div class="modal-actions">

    <button
        id="closeReportBtn"
        class="btn-edit">
        Anuluj
    </button>

    <button
        id="sendReportBtn"
        class="btn-delete">
        Wyślij e-mail
    </button>

</div>

<button
    id="newDayBtn"
    class="btn-primary new-day-btn">
    Rozpocznij nowy dzień
</button>

</div>

</div>

<div id="monthlyReportModal" class="modal">

    <div class="modal-content">

        <h3>Raport miesięczny</h3>

        <pre
            id="monthlyReportContent"
            class="report-content"></pre>

        <div class="modal-actions">

            <button
                id="closeMonthlyReportBtn"
                class="btn-edit">
                Anuluj
            </button>

            <button
                id="sendMonthlyReportBtn"
                class="btn-delete">
                Wyślij e-mail
            </button>

        </div>

        <button
            id="newMonthBtn"
            class="btn-primary new-day-btn">
            Rozpocznij nowy miesiąc
        </button>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
